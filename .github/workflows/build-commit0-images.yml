name: Build Commit0 Images

run-name: >-
  Build Commit0 Images
  ${{ github.event_name == 'workflow_dispatch' && inputs.sdk-commit != '' && format('(SDK: {0})', inputs.sdk-commit) || '' }}

on:
  # Called from evaluation repo (eval-job.yml) to build images before K8s evaluation
  workflow_call:
    inputs:
      sdk-commit:
        description: 'Software Agent SDK commit/ref to use'
        required: true
        type: string
      n-limit:
        description: 'Limit number of repos to build'
        required: false
        type: string
        default: ''
      instance-ids:
        description: 'Comma-separated instance IDs to build (optional, overrides n-limit)'
        required: false
        type: string
        default: ''
      benchmarks-ref:
        description: 'Benchmarks repo ref to checkout (for cross-repo calls)'
        required: false
        type: string
        default: ''
  pull_request_target:
    types: [labeled]
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset name (e.g., wentingzhao/commit0_combined)'
        required: true
        default: 'wentingzhao/commit0_combined'
        type: string
      split:
        description: 'Dataset split (e.g., test)'
        required: true
        default: 'test'
        type: string
      repo-split:
        description: 'Commit0 repo split (lite/all or repo name)'
        required: true
        default: 'lite'
        type: string
      max-workers:
        description: 'Number of concurrent build workers'
        required: false
        default: '4'
        type: string
      n-limit:
        description: 'Limit number of repos to build (for testing). Leave blank for no limit.'
        required: false
        default: ''
        type: string
      instance-ids:
        description: 'Comma-separated instance IDs to build (optional, overrides n-limit)'
        required: false
        default: ''
        type: string
      sdk-commit:
        description: 'Software Agent SDK commit/ref to use. Leave blank to use submodule default.'
        required: false
        default: ''
        type: string
      extensions-ref:
        description: 'Extensions repository branch/ref to use (for testing feature branches with skills/plugins). Leave blank to use main.'
        required: false
        default: 'main'
        type: string
      benchmarks-commit:
        description: 'Benchmarks repo commit/ref to use (for manual override)'
        required: false
        default: ''
        type: string
      force-build:
        description: 'Rebuild images even if matching remote tags already exist'
        required: false
        default: 'false'
        type: string

env:
  DATASET: wentingzhao/commit0_combined
  SPLIT: test
  REPO_SPLIT: lite
  MAX_WORKERS: '4'
  N_LIMIT: ''
  INSTANCE_IDS: ''
  SELECT_FILE: ''

concurrency:
  group: build-commit0-${{ inputs.sdk-commit || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'build-commit0')

    timeout-minutes: 600  # 10h — matches the old orchestrate_eval.py polling bound in the evaluation repo

    runs-on: ubuntu-latest-8core

    permissions:
      contents: read
      packages: write
      issues: write

    steps:
      - name: Determine checkout ref
        id: checkout-ref
        env:
          INPUTS_BENCHMARKS_REF: ${{ inputs.benchmarks-ref }}
          INPUTS_BENCHMARKS_COMMIT: ${{ inputs.benchmarks-commit }}
        run: |
          if [ -n "$INPUTS_BENCHMARKS_REF" ]; then
            echo "ref=$INPUTS_BENCHMARKS_REF" >> "$GITHUB_OUTPUT"
            echo "Using benchmarks-ref: $INPUTS_BENCHMARKS_REF"
          elif [ -n "$INPUTS_BENCHMARKS_COMMIT" ]; then
            echo "ref=$INPUTS_BENCHMARKS_COMMIT" >> "$GITHUB_OUTPUT"
            echo "Using benchmarks-commit: $INPUTS_BENCHMARKS_COMMIT"
          elif [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "Using PR head SHA: ${{ github.event.pull_request.head.sha }}"
          else
            echo "ref=" >> "$GITHUB_OUTPUT"
            echo "Using triggering ref (default)"
          fi

      - uses: actions/checkout@v6
        with:
          repository: OpenHands/benchmarks
          ref: ${{ steps.checkout-ref.outputs.ref }}
          submodules: recursive
          token: ${{ github.token }}

      - name: Apply workflow_dispatch overrides (if any)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUTS_DATASET: ${{ inputs.dataset }}
          INPUTS_SPLIT: ${{ inputs.split }}
          INPUTS_REPO_SPLIT: ${{ inputs.repo-split }}
          INPUTS_MAX_WORKERS: ${{ inputs.max-workers }}
          INPUTS_N_LIMIT: ${{ inputs.n-limit }}
          INPUTS_INSTANCE_IDS: ${{ inputs.instance-ids }}
          INPUTS_SDK_COMMIT: ${{ inputs.sdk-commit }}
        run: |
          if [ -n "$INPUTS_DATASET" ]; then echo "DATASET=$INPUTS_DATASET" >> "$GITHUB_ENV"; fi
          if [ -n "$INPUTS_SPLIT" ]; then echo "SPLIT=$INPUTS_SPLIT" >> "$GITHUB_ENV"; fi
          if [ -n "$INPUTS_REPO_SPLIT" ]; then echo "REPO_SPLIT=$INPUTS_REPO_SPLIT" >> "$GITHUB_ENV"; fi
          if [ -n "$INPUTS_MAX_WORKERS" ]; then echo "MAX_WORKERS=$INPUTS_MAX_WORKERS" >> "$GITHUB_ENV"; fi
          if [ -n "$INPUTS_N_LIMIT" ]; then echo "N_LIMIT=$INPUTS_N_LIMIT" >> "$GITHUB_ENV"; else echo "N_LIMIT=" >> "$GITHUB_ENV"; fi
          if [ -n "$INPUTS_INSTANCE_IDS" ]; then echo "INSTANCE_IDS=$INPUTS_INSTANCE_IDS" >> "$GITHUB_ENV"; fi
          if [ -n "$INPUTS_SDK_COMMIT" ]; then echo "SDK_COMMIT=$INPUTS_SDK_COMMIT" >> "$GITHUB_ENV"; fi

      - uses: ./.github/actions/build-select-file
        with:
          instance-ids: ${{ env.INSTANCE_IDS }}

      - name: Update SDK submodule
        if: ${{ inputs.sdk-commit != '' }}
        env:
          INPUTS_SDK_COMMIT: ${{ inputs.sdk-commit }}
        run: |
          cd vendor/software-agent-sdk
          git fetch origin "$INPUTS_SDK_COMMIT"
          git checkout FETCH_HEAD
          SDK_SHA=$(git rev-parse HEAD)
          cd ../..
          git add vendor/software-agent-sdk
          echo "Updated SDK submodule to $SDK_SHA (from $INPUTS_SDK_COMMIT)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          make build

      - name: "Preflight: prune cache and verify disk"
        run: |
          set -euo pipefail
          echo "=== Pre-prune disk ==="
          df -h
          free -h
          docker system df || true
          KEEP_GB=30
          echo "Pruning BuildKit cache to ${KEEP_GB} GiB..."
          if ! docker buildx prune --all --force --max-storage ${KEEP_GB}g 2>/dev/null; then
            docker buildx prune --all --force --keep-storage ${KEEP_GB}g || true
          fi
          docker builder prune -af --keep-storage ${KEEP_GB}g || true
          docker system prune -f || true
          echo "=== Post-prune disk ==="
          df -h
          docker system df || true

      - name: Build and push Commit0 images
        env:
          INPUTS_FORCE_BUILD: ${{ inputs.force-build || 'false' }}
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
          EXTENSIONS_REF: ${{ inputs.extensions-ref || 'main' }}

        run: |
          set -euo pipefail
          FORCE_BUILD="$INPUTS_FORCE_BUILD"

          CMD="uv run benchmarks/commit0/build_images.py \
            --dataset '${DATASET}' \
            --split '${SPLIT}' \
            --repo-split '${REPO_SPLIT}' \
            --image ghcr.io/openhands/eval-agent-server \
            --push \
            --max-workers '${MAX_WORKERS}'"

          if [ -n "${N_LIMIT}" ]; then
            CMD="$CMD --n-limit '${N_LIMIT}'"
          fi
          if [ -n "${SELECT_FILE}" ]; then
            CMD="$CMD --select '${SELECT_FILE}'"
          fi
          if [ "${FORCE_BUILD}" = "true" ]; then
            CMD="$CMD --force-build"
          fi

          echo "Running: $CMD"
          eval "$CMD"
      - name: Archive build logs
        if: always()
        run: |
          if [ -d builds ]; then
            tar -czf build-logs.tar.gz builds/
            echo "Build logs archived successfully"
          else
            echo "No builds directory found"
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs-${{ github.run_id }}
          path: build-logs.tar.gz
          retention-days: 7
          if-no-files-found: warn

      - name: Display build summary
        if: always()
        run: |
          uv run python -m benchmarks.scripts.summarize_build_manifests \
            --build-root builds \
            --title "Commit0 Image Build Summary" >> "$GITHUB_STEP_SUMMARY"
